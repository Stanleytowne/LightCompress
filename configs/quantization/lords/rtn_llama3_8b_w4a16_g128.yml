base:
    seed: &seed 42
model:
    type: Llama
    path: meta-llama/Meta-Llama-3-8B
    torch_dtype: auto
calib:
    name: wikitext2
    download: True
    path: wikitext2
    n_samples: 128
    bs: 1
    seq_len: 2048
    preproc: wikitext2_gptq
    seed: *seed
eval:
    eval_pos: [pretrain, fake_quant]
    name: wikitext2
    download: True
    path: wikitext2
    seq_len: 2048
    bs: 1
    inference_per_block: False
quant:
    method: RTN
    weight:
        bit: 4
        symmetric: True
        granularity: per_group
        group_size: 128
save:
    save_fake: False
    save_path: ./save/rtn_llama3_8b_w4a16_g128/
